[changelog]
header = ""
body = """
{% if version -%}
## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## Unreleased
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}
- {% if commit.remote.pr_title %}{{ commit.remote.pr_title | trim }}{% else %}{{ commit.message | split(pat="\n") | first | trim }}{% endif %}{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}{% if commit.remote.pr_number %} in #{{ commit.remote.pr_number }}{% else %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}

{% endfor %}
"""
trim = true
footer = "<!-- generated by git-cliff -->"

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
commit_preprocessors = [
  # Normalize common non-conventional prefixes into conventional format.
  # Patterns are tried in order; only the first match is applied.
  { pattern = "(?i)^bugfix\\s+(.*)", replace = "fix: $1" },
  { pattern = "^Fix\\s+(.*)", replace = "fix: $1" },
  { pattern = "^Add\\s+(.*)", replace = "feat: Add $1" },
  { pattern = "^Remove\\s+(.*)", replace = "refactor: Remove $1" },
  { pattern = "^Switch\\s+(.*)", replace = "refactor: Switch $1" },
  { pattern = "^Replace\\s+(.*)", replace = "refactor: Replace $1" },
  { pattern = "^Wire\\s+(.*)", replace = "feat: Wire $1" },
  { pattern = "^Make\\s+(.*)", replace = "refactor: Make $1" },
  { pattern = "^Elevate\\s+(.*)", replace = "feat: Elevate $1" },
  { pattern = "^Expand\\s+(.*)", replace = "feat: Expand $1" },
  { pattern = "^Adopt\\s+(.*)", replace = "feat: Adopt $1" },
  { pattern = "^Rename\\s+(.*)", replace = "refactor: Rename $1" },
  { pattern = "^Refactor\\s+(.*)", replace = "refactor: $1" },
  { pattern = "^Update\\s+(.*)", replace = "docs: Update $1" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^security", group = "Security" },
  { message = "^docs?", group = "Documentation" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI" },
  { message = "^build", group = "Build" },
  { message = "^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
  { message = ".*", group = "Other Changes" },
]
filter_commits = false
fail_on_unmatched_commit = false
tag_pattern = "v[0-9].*"
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
