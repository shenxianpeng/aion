name: RepoKeeper Patrol

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: read
  pull-requests: write

jobs:
  patrol:
    name: Daily Patrol
    uses: shenxianpeng/.github/.github/workflows/repokeeper-patrol.yml@main
    with:
      repo: ${{ github.repository }}
    secrets:
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
      repo_token: ${{ secrets.GITHUB_TOKEN }}
