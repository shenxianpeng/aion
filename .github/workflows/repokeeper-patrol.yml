name: RepoKeeper Daily Patrol

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  patrol:
    name: Daily Patrol
    uses: shenxianpeng/.github/.github/workflows/repokeeper-patrol.yml@main
    with:
      repo: ${{ github.repository }}
      python_version: "3.11"
    secrets:
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
      repo_token: ${{ secrets.GITHUB_TOKEN }}
