name: RepoKeeper Community Radar

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  discussions: read
  issues: write

jobs:
  radar:
    name: Community Radar
    uses: shenxianpeng/.github/.github/workflows/repokeeper-radar.yml@main
    with:
      repo: ${{ github.repository }}
    secrets:
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
      repo_token: ${{ secrets.GITHUB_TOKEN }}
      smtp_host: ${{ secrets.RKP_SMTP_HOST }}
      smtp_port: ${{ secrets.RKP_SMTP_PORT }}
      smtp_user: ${{ secrets.RKP_SMTP_USER }}
      smtp_pass: ${{ secrets.RKP_SMTP_PASS }}
      telegram_chat_id: ${{ secrets.RKP_TELEGRAM_CHAT_ID }}
