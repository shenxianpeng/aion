name: RepoKeeper Community Radar

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  discussions: read
  issues: write

jobs:
  radar:
    name: Community Radar
    uses: shenxianpeng/.github/.github/workflows/repokeeper-radar.yml@main
    with:
      repo: ${{ github.repository }}
    secrets:
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
      repo_token: ${{ secrets.GITHUB_TOKEN }}
