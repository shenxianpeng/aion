name: RepoKeeper Implementation Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number for RepoKeeper to implement"
        required: true
        type: number

permissions:
  actions: read
  contents: read

jobs:
  repokeeper:
    name: RepoKeeper Agent
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        contains(github.event.comment.body, '@repokeeper go') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'agent-todo'
      )
    uses: shenxianpeng/.github/.github/workflows/repokeeper-agent.yml@main
    with:
      repo: ${{ github.repository }}
      issue_number: ${{ github.event.inputs.issue || github.event.issue.number }}
      python_version: "3.11"
    secrets:
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
      repo_token: ${{ secrets.REPOKEEPER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      llm_base_url: ${{ secrets.LLM_BASE_URL }}
