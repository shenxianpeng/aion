site_name: AION
site_description: The Self-Evolving Code Engine. Code Once, Live Forever.
site_url: https://shenxianpeng.github.io/aion/
repo_url: https://github.com/shenxianpeng/aion
repo_name: shenxianpeng/aion
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/infinity
    repo: fontawesome/brands/github
    alternate: material/earth
  font:
    text: Space Grotesk
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/future.css

nav:
  - Overview: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Configuration: configuration.md
  - How It Works: how-it-works.md
  - Roadmap: roadmap.md

plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
          link: /
        - locale: zh
          name: 中文
          build: true
          link: /zh/
          nav_translations:
            Overview: 概览
            Installation: 安装
            Usage: 使用
            Configuration: 配置
            How It Works: 工作原理
            Roadmap: 路线图

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shenxianpeng/aion
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aion-evolve/
  generator: false

copyright: MIT License · AION
