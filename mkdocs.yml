site_name: AION
site_description: The Self-Evolving Code Engine. Code Once, Live Forever.
site_url: https://shenxianpeng.github.io/aion/
repo_url: https://github.com/shenxianpeng/aion
repo_name: shenxianpeng/aion
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: false
    code: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - English:
    - Overview: en/index.md
    - Installation: en/installation.md
    - Usage: en/usage.md
    - Configuration: en/configuration.md
    - How It Works: en/how-it-works.md
  - 中文:
    - 概览: zh/index.md
    - 安装: zh/installation.md
    - 使用: zh/usage.md
    - 配置: zh/configuration.md
    - 工作原理: zh/how-it-works.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shenxianpeng/aion
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aion/
  generator: false

copyright: MIT License · AION
