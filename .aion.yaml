updates:
  - directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    provider: openai
    model: gpt-4.1
    ignore_paths:
      - tests/**
      - scripts/generated_*.py
    auto_repair_issue_types:
      - raw_sqlite_query
      - hardcoded_secret
      - missing_auth_decorator
      - insecure_yaml_load
      - command_injection
      - eval_injection
      - subprocess_shell_injection
      - weak_cryptography
    auto_repair_min_confidence: 0.85
    sandbox_mode: repository
    sandbox_verification_commands:
      - python -m pytest tests/unit
    auto_approve_verified_fixes: false
    rollback_on_verification_failure: true
    open_pull_requests_limit: 5
    labels:
      - "aion"
      - "security"
    assignees:
      - "shenxianpeng"
    target_branch: "main"
    commit_message_prefix: "[AION]"
