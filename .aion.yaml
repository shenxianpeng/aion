updates:
  - directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    provider: openai
    model: gpt-4.1
    ignore_paths:
      - tests/**
      - scripts/generated_*.py
    open_pull_requests_limit: 5
    labels:
      - "aion"
      - "security"
    assignees:
      - "shenxianpeng"
    target_branch: "main"
    commit_message_prefix: "[AION]"
